<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
<style>
   @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background-color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-family: sans-serif;
  }

  /* El contenedor escala con el ancho de la pantalla, entre 220px y 340px */
  .piel{
 	 background-color: #faf; 
    padding: 1em; 
    width: 100%;
    max-width: 340px;
    min-width: 220px;
    margin:auto; 
    border:5px solid #f0f; 
    border-top:0; 
    border-radius:15px;
  }

  .noLcd {
    width: 100%;
    margin: 0 0 6px 0;
    border: 0;
    background-color: #efa;
    font-size: clamp(9px, 3vw, 13px);
    text-align: right;
    color: #333;
    font-family: "DotGothic16", sans-serif;
    font-weight: 400;
    font-style: normal;
    padding: 4px 6px;
  }

  .lcd {
    width: 100%;
    height: clamp(28px, 8vw, 40px);
    font-size: clamp(20px, 6vw, 32px);
    text-align: right;
    margin: 0 0 10px 0;
    border: 0;
    background-color: #efa;
    color: black;
    font-family: "DotGothic16", sans-serif;
    font-weight: 400;
    font-style: normal;
    padding: 0 6px;
  }

  /* Filas de botones como grid: se reparten el ancho disponible a partes iguales */
  .row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  input[type="button"] {
    width: 100%;
    aspect-ratio: 1 / 1;
    font-size: clamp(18px, 6vw, 28px);
    font-weight: 700;
    margin: 0;
    padding: 0;
    cursor: pointer;
    border: none;
    border-radius: 15px;
  }

  input[type="text"] {
    box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="piel">
    <!--Campo para mostrar la operación realizada-->
    <div>
        <input class="noLcd" disabled="" id="operationDisplay" type="text" />
    </div>
    <!--Campo para mostrar el resultado-->
    <div>
        <input class="lcd" disabled="" id="display" type="text" />
    </div>
    <!--Botones de la calculadora-->
    <div class="row">
        <input onclick="clearDisplay()" style="background-color: #ff5555;" type="button" value="C" />
        <input onclick="toggleSign()" style="background-color: #aaffff;" type="button" value="+/-" />
        <input onclick="setOperation('^')" style="background-color: #aaffff;" type="button" value="^" />
        <input onclick="setOperation('sqrt')" style="background-color: #aaffff;" type="button" value="√" />
    </div>
    <div class="row">
        <input onclick="appendNumber(7)" type="button" value="7" />
        <input onclick="appendNumber(8)" type="button" value="8" />
        <input onclick="appendNumber(9)" type="button" value="9" />
        <input onclick="setOperation('/')" style="background-color: #aaffff;" type="button" value="/" />
    </div>
    <div class="row">
        <input onclick="appendNumber(4)" type="button" value="4" />
        <input onclick="appendNumber(5)" type="button" value="5" />
        <input onclick="appendNumber(6)" type="button" value="6" />
        <input onclick="setOperation('*')" style="background-color: #aaffff;" type="button" value="*" />
    </div>
    <div class="row">
        <input onclick="appendNumber(1)" type="button" value="1" />
        <input onclick="appendNumber(2)" type="button" value="2" />
        <input onclick="appendNumber(3)" type="button" value="3" />
        <input onclick="setOperation('-')" style="background-color: #aaffff;" type="button" value="-" />
    </div>
    <div class="row">
        <input onclick="appendNumber(0)" type="button" value="0" />
        <input onclick="appendDecimal()" type="button" value="." />
        <input onclick="calculateResult()" style="background-color: #ffffaa;" type="button" value="=" />
        <input onclick="setOperation('+')" style="background-color: #aaffff;" type="button" value="+" />
    </div>
</div>

<script>
    let currentInput = '';
    let currentOperation = '';
    let previousInput = '';
    let operationString = '';
    let justCalculated = false; // evita que un nuevo número se concatene al resultado anterior

    function appendNumber(number) {
        if (justCalculated) {
            currentInput = '';
            operationString = '';
            justCalculated = false;
        }
        currentInput += number;
        document.getElementById('display').value = currentInput;
        operationString += number;
        document.getElementById('operationDisplay').value = operationString;
    }

    function appendDecimal() {
        if (justCalculated) {
            currentInput = '';
            operationString = '';
            justCalculated = false;
        }
        if (!currentInput.includes('.')) {
            currentInput += '.';
            document.getElementById('display').value = currentInput;
            operationString += '.';
            document.getElementById('operationDisplay').value = operationString;
        }
    }

    function toggleSign() {
        if (currentInput !== '') {
            currentInput = (parseFloat(currentInput) * -1).toString();
            document.getElementById('display').value = currentInput;
            operationString = currentInput;
            document.getElementById('operationDisplay').value = operationString;
        }
    }

    function setOperation(operation) {
        justCalculated = false;
        if (currentInput === '') return;
        if (previousInput !== '') calculateResult();
        currentOperation = operation;
        previousInput = currentInput;
        currentInput = '';
        operationString += ' ' + operation + ' ';
        document.getElementById('operationDisplay').value = operationString;
    }

    function clearDisplay() {
        currentInput = '';
        previousInput = '';
        currentOperation = '';
        operationString = '';
        justCalculated = false;
        document.getElementById('display').value = '';
        document.getElementById('operationDisplay').value = '';
    }

    function calculateResult() {
        if (currentOperation === 'sqrt') {
            currentInput = 0;
        }
        if (currentInput === '' || previousInput === '') return;
        let result;
        const prev = parseFloat(previousInput);
        const current = parseFloat(currentInput);

        switch (currentOperation) {
            case '+':
                result = prev + current;
                break;
            case '-':
                result = prev - current;
                break;
            case '*':
                result = prev * current;
                break;
            case '/':
                if (current === 0) {
                    if (prev === 0) {
                        result = 'Indet.';
                        break;
                    }
                    result = 'Inf.';
                    break;
                } else {
                    result = prev / current;
                }
                break;
            case '^':
                result = prev ** current;
                break;
            case 'sqrt':
                if (prev <= 0) {
                    result = 'Indet.';
                    break;
                }
                result = Math.sqrt(prev);
                break;
            default:
                return;
        }

        currentInput = result.toString();
        currentOperation = '';
        previousInput = '';
        operationString = result.toString();
        justCalculated = true;
        document.getElementById('display').value = currentInput;
    }
</script>

</body>
</html>
